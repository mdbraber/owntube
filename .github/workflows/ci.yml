name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Typecheck, test, build
    runs-on: ubuntu-latest

    env:
      DATABASE_PATH: ./data/owntube.db
      AUTH_SECRET: ci-only-not-a-real-secret
      LOG_LEVEL: error
      NEXT_TELEMETRY_DISABLED: "1"
      PIPED_BASE_URL: disabled

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter web typecheck

      - name: Lint (Biome)
        # Soft fail for now: surfaces issues in the run summary without
        # blocking PRs. Flip back to a required check once the remaining
        # warnings are paid down.
        continue-on-error: true
        run: pnpm lint

      - name: Apply migrations
        run: |
          mkdir -p apps/web/data
          pnpm --filter web db:migrate

      - name: Unit tests (Vitest)
        run: pnpm --filter web test

      - name: Build
        run: pnpm --filter web build
