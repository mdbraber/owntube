services:
  app:
    container_name: owntube
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_PATH: /app/data/owntube.db
      PIPED_BASE_URL: ${PIPED_BASE_URL:-https://pipedapi.kavin.rocks}
      INVIDIOUS_BASE_URL: ${INVIDIOUS_BASE_URL:-}
      PIPED_PROXY_BASE_URL: ${PIPED_PROXY_BASE_URL:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      UPSTREAM_RATE_LIMIT_MAX_REQUESTS: ${UPSTREAM_RATE_LIMIT_MAX_REQUESTS:-300}
      UPSTREAM_RATE_LIMIT_WINDOW_MS: ${UPSTREAM_RATE_LIMIT_WINDOW_MS:-60000}
      OWNTUBE_DEBUG_RECOMMENDATIONS: ${OWNTUBE_DEBUG_RECOMMENDATIONS:-}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env.unraid}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      AUTH_URL: "${AUTH_URL:?set AUTH_URL in .env.unraid (example: http://192.168.1.11:3000)}"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NEXT_TELEMETRY_DISABLED: "1"
      TZ: ${TZ:-Europe/Paris}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - /mnt/user/appdata/owntube/data:/app/data

  cache-warmer:
    container_name: owntube-cache-warmer
    build: .
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      DATABASE_PATH: /app/data/owntube.db
      PIPED_BASE_URL: ${PIPED_BASE_URL:-https://pipedapi.kavin.rocks}
      INVIDIOUS_BASE_URL: ${INVIDIOUS_BASE_URL:-}
      PIPED_PROXY_BASE_URL: ${PIPED_PROXY_BASE_URL:-}
      OWNTUBE_WARM_INTERVAL_SEC: ${OWNTUBE_WARM_INTERVAL_SEC:-1200}
      OWNTUBE_WARM_REGION: ${OWNTUBE_WARM_REGION:-US}
      OWNTUBE_WARM_LIMIT: ${OWNTUBE_WARM_LIMIT:-48}
      OWNTUBE_WARM_CHANNELS: ${OWNTUBE_WARM_CHANNELS:-true}
      OWNTUBE_WARM_CHANNEL_PAGES: ${OWNTUBE_WARM_CHANNEL_PAGES:-true}
      OWNTUBE_WARM_SHORTS: ${OWNTUBE_WARM_SHORTS:-true}
      OWNTUBE_WARM_HISTORY_CHANNELS: ${OWNTUBE_WARM_HISTORY_CHANNELS:-32}
      OWNTUBE_WARM_SUBSCRIPTION_CHANNELS: ${OWNTUBE_WARM_SUBSCRIPTION_CHANNELS:-64}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NEXT_TELEMETRY_DISABLED: "1"
      TZ: ${TZ:-Europe/Paris}
    volumes:
      - /mnt/user/appdata/owntube/data:/app/data
    command: >
      sh -c 'while true; do
        pnpm warm:cache || true;
        sleep $${OWNTUBE_WARM_INTERVAL_SEC:-1200};
      done'
